services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: resolveai-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: resolve_ai
    ports:
      - "5432:5432"
    volumes:
      - resolveai_pgdata:/var/lib/postgresql/data

volumes:
  resolveai_pgdata:
