services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: resolveai-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: resolve_ai
    ports:
      - "5432:5432"
    volumes:
      - resolveai_pgdata:/var/lib/postgresql/data

  qdrant:
    image: qdrant/qdrant:latest
    container_name: resolveai-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - resolveai_qdrant:/qdrant/storage

volumes:
  resolveai_pgdata:
  resolveai_qdrant:
